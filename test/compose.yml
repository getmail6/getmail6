services:

  # Generate self-signed certs
  # See: https://docker-mailserver.github.io/docker-mailserver/latest/config/security/ssl/#self-signed-certificates
  step-ca:
    image: smallstep/step-ca:latest
    working_dir: /certs
    volumes:
      - certs:/certs
    entrypoint:
      - /bin/sh
    user: 0:0
    command:
      - -c
      - |
          set -eu
          if [ ! -d demoCA ]; then
              mkdir -p demoCA

              step certificate create "Smallstep Root CA" "demoCA/cacert.pem" "demoCA/cakey.pem" \
                --no-password --insecure \
                --profile root-ca \
                --not-before "2021-01-01T00:00:00+00:00" \
                --not-after "2031-01-01T00:00:00+00:00" \
                --san "example.test" \
                --san "mail.example.test" \
                --kty RSA --size 2048

              step certificate create "Smallstep Leaf" mail.example.test-cert.pem mail.example.test-key.pem \
                --no-password --insecure \
                --profile leaf \
                --ca "demoCA/cacert.pem" \
                --ca-key "demoCA/cakey.pem" \
                --not-before "2021-01-01T00:00:00+00:00" \
                --not-after "2031-01-01T00:00:00+00:00" \
                --san "example.test" \
                --san "mail.example.test" \
                --san "imap.example.test" \
                --san "smtp.example.test" \
                --kty RSA --size 2048
          fi


  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:15.1
    hostname: mail.example.test
    domainname: example.test
    container_name: mail.example.test
    environment:
      - PERMIT_DOCKER=container
      - ENABLE_POP3=1
      - DOVECOT_TLS="yes"
      - TESTPSSWD=${TESTPSSWD}
      - TESTEMAIL=${TESTEMAIL}
      - ENABLE_SASLAUTHD=1
      - SASLAUTHD_MECHANISMS=rimap
      - SASLAUTHD_MECH_OPTIONS=mail.example.test
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_CLAMAV=1
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ENABLE_MANAGESIEVE=1
      - ONE_DIR=1
      - DMS_DEBUG=1
      - POSTFIX_INET_PROTOCOLS=ipv4
      - DOVECOT_INET_PROTOCOLS=ipv4
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/certs/mail.example.test-cert.pem
      - SSL_KEY_PATH=/certs/mail.example.test-key.pem
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - certs:/certs
      - dms-mail-data:/var/mail
      - dms-mail-state:/var/mail-state
      - dms-mail-logs:/var/log/mail
      - dms-config:/tmp/docker-mailserver
      - ..:/tmp/docker-mailserver/getmail6
      - ./ssl:/tmp/docker-mailserver/ssl
    networks:
      default:
        aliases:
          - example.test
          - mail.example.test
          - imap.example.test
          - smtp.example.test
    depends_on:
      step-ca:
        condition: service_completed_successfully
    restart: always
    cap_add:
      - SYS_PTRACE
    entrypoint:
      - /bin/sh
    configs:
      - source: dms-accounts
        target: /tmp/docker-mailserver/postfix-accounts.cf
      - source: sieve
        target: /tmp/docker-mailserver/user1@example.test.dovecot.sieve
    command:
      - -c
      - |
          set -eu
          echo "Trusting demoCA certificate"
          cp -v /certs/demoCA/cacert.pem /usr/local/share/ca-certificates/cacert.crt  # Debian expects certs to end with .crt
          update-ca-certificates
          exec supervisord -c /etc/supervisor/supervisord.conf && apt-get update && apt-get install git iputils-ping make nmap procmail python3-pip 
configs:
  dms-accounts:
    content: |
      jane.doe@example.test|{SHA512-CRYPT}$$6$$sbgFRCmQ.KWS5ryb$$EsWrlYosiadgdUOxCBHY0DQ3qFbeudDhNMqHs6jZt.8gmxUwiLVy738knqkHD4zj4amkb296HFqQ3yDq4UXt8.
      john.doe@example.test|{SHA512-CRYPT}$$6$$sbgFRCmQ.KWS5ryb$$EsWrlYosiadgdUOxCBHY0DQ3qFbeudDhNMqHs6jZt.8gmxUwiLVy738knqkHD4zj4amkb296HFqQ3yDq4UXt8.
  sieve:
    content: |
      if envelope :detail :regex "to" "^(idle1|idle2)$" {
        set :lower :upperfirst "tag" "$${1}";
        fileinto :create "$${tag}";
      }

volumes:
  certs:
  dms-mail-data:
  dms-mail-state:
  dms-mail-logs:
  dms-config:

networks:
  default:
